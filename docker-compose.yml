      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_CLIENT_ID: l0-bus-operation-status
      MQTT_SUB_TOPIC: service/mobility/observation/bus-telemetry
      MQTT_PUB_TOPIC: service/mobility/inference/bus-operation-status
      SERVICE_URN: urn:ufcity:service:bus-operation-status
    depends_on:
      - mosquitto
      - producer-bus

  l0-bus-regional-supply:
    image: ufcity-services-base:local
