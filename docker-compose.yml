x-build-base: &build-base
  context: ./services
  dockerfile: Dockerfile.base

x-build-producer: &build-producer
  context: ./producer
  dockerfile: Dockerfile.base

services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1884:1883"
    volumes:
      - ./broker-mqtt/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./broker-mqtt/mosquitto/data:/mosquitto/data
      - ./broker-mqtt/mosquitto/log:/mosquitto/log

  producer-bus:
    image: ufcity-producers-base:local
    build:
      <<: *build-producer
    command: ["sh", "-c", "g++ -O2 -std=c++17 /app/main.cpp -lmosquitto -o /tmp/producer && /tmp/producer"]
    container_name: producer-bus
    restart: unless-stopped
    volumes:
      - ./producer/bus:/app:ro
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_PUB_TOPIC: service/mobility/observation/bus-telemetry
      MQTT_SUB_TOPIC: service/mobility/command/bus
    depends_on:
      - mosquitto

  producer-radar:
    image: ufcity-producers-base:local
    build:
      <<: *build-producer
    command: ["sh", "-c", "g++ -O2 -std=c++17 /app/main.cpp -lmosquitto -o /tmp/producer && /tmp/producer"]
    container_name: producer-radar
    restart: unless-stopped
    volumes:
      - ./producer/radar:/app:ro
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_PUB_TOPIC: service/mobility/observation/radar-telemetry
      MQTT_SUB_TOPIC: service/mobility/command/radar
    depends_on:
      - mosquitto

  l0-traffic-flow:
    image: ufcity-services-base:local
    build:
      <<: *build-base
    command: ["python", "/app/service/service.py"]
    container_name: l0-traffic-flow
    restart: unless-stopped
    volumes:
      - ./services/L0/traffic-flow:/app/service:ro
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_CLIENT_ID: l0-traffic-flow
      MQTT_SUB_TOPICS: service/mobility/observation/radar-telemetry
      MQTT_PUB_TOPIC: service/mobility/inference/traffic-flow
      SERVICE_URN: urn:ufcity:service:traffic-flow
    depends_on:
      - mosquitto
      - producer-radar

  l0-traffic-speed:
    image: ufcity-services-base:local
    build:
      <<: *build-base
    command: ["python", "/app/service/service.py"]
    container_name: l0-traffic-speed
